version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: technopath
      POSTGRES_PASSWORD: technopath
      POSTGRES_DB: technopath
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  pg_data:
  minio_data:
